<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>X Header · @Skub0k · observer & investor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 1500px; height: 500px;
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif;
      color: #111; background: #fff;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }
    .header {
      width: 1500px; height: 500px;
      padding: 56px 72px;
      display: flex; flex-direction: column; justify-content: space-between;
      position: relative;
    }

    /* TOP ROW · positioning + week stamp */
    .top-row {
      display: flex; justify-content: space-between; align-items: baseline;
    }
    .positioning {
      font-size: 14pt; font-weight: 600; letter-spacing: 0.5pt;
      text-transform: lowercase; color: #666;
    }
    .week-stamp {
      font-family: 'SF Mono', Menlo, Monaco, Consolas, monospace;
      font-size: 11pt; color: #999; letter-spacing: 0.5pt;
    }

    /* MIDDLE · tagline */
    .tagline {
      font-size: 36pt; font-weight: 800; line-height: 1.15;
      letter-spacing: -0.8pt; color: #111;
      max-width: 1100px;
    }

    /* TICKER · 6 brands */
    .ticker {
      display: flex; flex-direction: column; gap: 10pt;
      font-family: 'SF Mono', Menlo, Monaco, Consolas, monospace;
    }
    .ticker-line {
      font-size: 11pt; color: #666; letter-spacing: 0.3pt;
    }
    .ticker-rule {
      width: 100%; height: 1px; background: #111;
    }

    /* BOTTOM ROW · CTA + handle */
    .bottom-row {
      display: flex; justify-content: space-between; align-items: baseline;
    }
    .cta {
      font-size: 12pt; font-weight: 600; color: #111;
    }
    .cta .arrow {
      color: #cc0000; font-weight: 700; margin: 0 4pt;
    }
    .handle {
      font-family: 'SF Mono', Menlo, Monaco, Consolas, monospace;
      font-size: 12pt; color: #666; letter-spacing: 0.3pt;
    }
  </style>
</head>
<body>
  <div class="header">

    <div class="top-row">
      <div class="positioning">observer &amp; investor</div>
      <div class="week-stamp">week [[WEEK]] · 2026</div>
    </div>

    <div class="tagline">
      decoding tech, markets, and the empires<br>
      being built around them.
    </div>

    <div class="ticker">
      <div class="ticker-line">
        musk · openai · anthropic · nvidia · apple · starlink · markets
      </div>
      <div class="ticker-rule"></div>
    </div>

    <div class="bottom-row">
      <div class="cta">
        free monthly tracker pdf <span class="arrow">→</span> link in bio
      </div>
      <div class="handle">@Skub0k</div>
    </div>

  </div>
</body>
</html>
