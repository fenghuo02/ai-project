# 客户色卡配置 · 模板
# ============================================================
# 每个客户复制一份此文件到 swatch-builder/clients/<客户ID>/data.yaml
# 然后修改下方字段——颜色 ID 见 swatch-builder/palette/colors.yaml
# ============================================================

meta:
  client_id: "客户ID"               # 用作目录名，建议姓名+生日
  client_name: "客户姓名"           # 印章上的姓氏
  client_seal_char: "X"            # 朱砂烫金印章上的一个字
  edition: "No.001 / 2026"
  year_label: "丙午年仲春"
  birth_solar: "1988-08-08 07:00"  # 阳历生日（不必精确，仅打印用）
  bazi: "戊辰 庚申 壬午 甲辰"        # 来自 mingshu-builder/clients/.../data.yaml

# 客户的本命色组合
# ------------------------------------------------------------
signature:
  primary:                          # 主色（1-2 个）
    - "nuantuo"
    - "zhuguangjin"
  secondary:                        # 辅色（1-2 个）
    - "mibai"
  forbidden:                        # 避忌色（1 个）
    - "lengyin"

# 档 A · 单张钩子色卡
# ------------------------------------------------------------
tier_a:
  enabled: true
  # 默认输出 1 张（主色第一个），可设置多张
  cards:
    - "nuantuo"

# 档 B · 八门标准色票套
# ------------------------------------------------------------
# 注：八门所有客户都用全套（共 16 张 = 8 门 × 主色+辅色）
# 客户专属内容只在解读小册子里——色票本身共享
tier_b:
  enabled: true

# 档 C · 年度全色矿物色卡
# ------------------------------------------------------------
tier_c:
  enabled: true
  edition_full: "No.001 / 2026 · 暖驼之书"

# 档 D · B 端极致礼盒
# ------------------------------------------------------------
# B 端客户才用此档——同色丝巾用本命主色第一个
tier_d:
  enabled: false
  scarf_color: "nuantuo"
  wallpaper_color: "nuantuo"
