# ===========================================================
# 项目用色全集（19 色）· 单一真相来源（Single Source of Truth）
# ===========================================================
# 这份 YAML 是整个项目所有颜色相关产品的"色谱母本"：
#  - swatch-builder 的 4 档色卡 PDF 用它
#  - mingshu-builder 的 PDF 命书附录页用它（v2.1.2 起引用此文件）
#  - 业务计划书 §5.2.1 与此表内容完全对应
#
# 修改原则：
#  - 任何客户都不应该只看到自己用神色——色卡都是 19 色全集
#  - 只增不删（删除颜色会让旧客户的实物色卡和文档对不上）
#  - 如有微调（如 HEX 微改），版本号 +1 并记录到 CHANGELOG
# ===========================================================

version: "1.0"
date: "2026-04-01"
total_colors: 19

# 19 色按色相排序，与 §5.2.1 表格一致
colors:
  # ─── 红 ───
  - id: zhusha
    name_cn: "朱砂"
    name_en: "Vermillion"
    hex: "#C0392B"
    pantone_match: "PMS 7621 C"
    family: "火"
    family_hue: "红"
    poem: "冬至清晨，第一缕阳光投在朱漆门上的颜色。"
    appears_in:
      - "丁火日主基础色"
      - "灵感门"
      - "除夕 / 春节 / 端午"
      - "12 月色卡"
    mineral_recipe:
      main: "辰州朱砂粉 70%"
      additive: "蛤粉 5%"
      binder: "阿拉伯胶 25%"
      note: "辰州砂是国家地理标志，¥40/g"

  - id: fenxia
    name_cn: "粉霞"
    name_en: "Rose Mist"
    hex: "#F0A6A6"
    pantone_match: "PMS 1765 C"
    family: "火"
    family_hue: "红淡"
    poem: "七夕黄昏，霞光在云面晕开的浅红。"
    appears_in:
      - "七夕节日壁纸"
    mineral_recipe:
      main: "朱砂 30%"
      additive: "蛤粉 60%"
      binder: "阿拉伯胶 10%"
      note: "粉色矿物颜料稀有，须以朱砂+蛤粉调和"

  # ─── 橘 ───
  - id: zhuju
    name_cn: "朱橘"
    name_en: "Cinnabar Orange"
    hex: "#E67E22"
    pantone_match: "PMS 1585 C"
    family: "火"
    family_hue: "橘"
    poem: "立夏初阳，柿子刚熟时的橙红。"
    appears_in:
      - "丙火日主基础色"
      - "元宵节日壁纸"
      - "5 月色卡"
    mineral_recipe:
      main: "雌黄 50%"
      additive: "朱砂 20%"
      binder: "阿拉伯胶 30%"
      note: "雌黄 ¥15/g，调和后橙度高且稳定"

  # ─── 棕 ───
  - id: zheshi
    name_cn: "赭石"
    name_en: "Ochre"
    hex: "#A0522D"
    pantone_match: "PMS 470 C"
    family: "土"
    family_hue: "棕"
    poem: "寒露过后，红叶尚未完全褪尽的褐红。"
    appears_in:
      - "戊土日主基础色"
      - "10 月色卡"
    mineral_recipe:
      main: "天然赭石粉 80%"
      additive: ""
      binder: "阿拉伯胶 20%"
      note: "江西宜春产，颗粒粗细决定光泽度"

  - id: muhe
    name_cn: "暮褐"
    name_en: "Twilight Brown"
    hex: "#6B4423"
    pantone_match: "PMS 4625 C"
    family: "土"
    family_hue: "深棕"
    poem: "戌时暮色，山影在湖面漫开的深褐。"
    appears_in:
      - "死门壁纸（断舍释怀）"
    mineral_recipe:
      main: "焦赭 60%"
      additive: "松烟墨 20%"
      binder: "阿拉伯胶 20%"
      note: "松烟墨用徽州胡开文，¥80/锭"

  # ─── 金驼 ⭐ 主理人本命色 ───
  - id: nuantuo
    name_cn: "暖驼"
    name_en: "Warm Camel"
    hex: "#C9A66B"
    pantone_match: "PMS 7503 C"
    family: "土"
    family_hue: "金驼"
    star: true                       # 主理人本命色，最高频
    poem: "秋天傍晚七点，麦田被染上的颜色。"
    appears_in:
      - "己土日主基础色"
      - "★ 主理人 1988-08-08 本命色"
