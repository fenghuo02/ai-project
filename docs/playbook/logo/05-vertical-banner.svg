<?xml version="1.0" encoding="UTF-8"?>
<!--
  渝山东方美学 · 竖版条幅（工作室门口 / 朋友圈分享图 / 海报）
  Vertical Banner · v1.0 · 2026-05-17

  使用场景：
  - 工作室门口立牌（500 × 1500 mm 印刷）
  - 朋友圈竖图分享（1080 × 1920）
  - 产品海报顶部 / 底部条
  - 礼品包装条（侧边贴）

  布局：从上到下 → 装饰金线 + 朱砂印 + 中文主名 + 英文 + 装饰金线
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 800" width="300" height="800">

  <defs>
    <filter id="v-seal-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#C0392B" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- 米白底 -->
  <rect x="0" y="0" width="300" height="800" fill="#FAF7F2"/>

  <!-- 顶部装饰线 -->
  <line x1="100" y1="80" x2="200" y2="80" stroke="#D4AF37" stroke-width="1.5"/>
  <circle cx="80" cy="80" r="3" fill="#D4AF37"/>
  <circle cx="220" cy="80" r="3" fill="#D4AF37"/>

  <!-- 朱砂方印 -->
  <g transform="translate(150 200) rotate(-2)" filter="url(#v-seal-shadow)">
    <rect x="-70" y="-70" width="140" height="140" fill="#C0392B"/>
    <text x="0" y="-15"
          fill="#FAF7F2"
          font-family="STKaiti, KaiTi, STSong, SimSun, serif"
          font-size="58"
          font-weight="900"
          text-anchor="middle"
          dominant-baseline="middle">渝</text>
    <text x="0" y="42"
          fill="#FAF7F2"
          font-family="STKaiti, KaiTi, STSong, SimSun, serif"
          font-size="58"
          font-weight="900"
          text-anchor="middle"
          dominant-baseline="middle">山</text>
  </g>

  <!-- 中文主名（竖排） -->
  <text x="150" y="380"
        fill="#2C3E50"
        font-family="STSong, SimSun, serif"
        font-size="36"
        font-weight="700"
        text-anchor="middle"
        letter-spacing="14">渝山</text>
  <text x="150" y="430"
        fill="#2C3E50"
        font-family="STSong, SimSun, serif"
        font-size="36"
        font-weight="700"
        text-anchor="middle"
        letter-spacing="14">东方美学</text>

  <!-- 装饰金竖线 -->
  <line x1="150" y1="470" x2="150" y2="540" stroke="#D4AF37" stroke-width="1"/>

  <!-- 英文副名 -->
  <text x="150" y="580"
        fill="#8B7355"
        font-family="Garamond, 'Times New Roman', serif"
        font-size="14"
        font-weight="500"
        text-anchor="middle"
        letter-spacing="6"
        font-style="italic">YUSHAN</text>
  <text x="150" y="608"
        fill="#8B7355"
        font-family="Garamond, 'Times New Roman', serif"
        font-size="11"
        font-weight="500"
        text-anchor="middle"
        letter-spacing="4"
        font-style="italic">ORIENTAL AESTHETICS</text>

  <!-- 中部 19 色色谱缩影（极小，作装饰） -->
  <g transform="translate(150 670)">
    <rect x="-95" y="-3" width="10" height="6" fill="#C0392B"/>
    <rect x="-83" y="-3" width="10" height="6" fill="#F0A6A6"/>
    <rect x="-71" y="-3" width="10" height="6" fill="#E67E22"/>
    <rect x="-59" y="-3" width="10" height="6" fill="#A0522D"/>
    <rect x="-47" y="-3" width="10" height="6" fill="#6B4423"/>
    <rect x="-35" y="-3" width="10" height="6" fill="#C9A66B"/>
    <rect x="-23" y="-3" width="10" height="6" fill="#D4AF37"/>
    <rect x="-11" y="-3" width="10" height="6" fill="#F4D03F"/>
    <rect x="1" y="-3" width="10" height="6" fill="#F5E6C8"/>
    <rect x="13" y="-3" width="10" height="6" fill="#FAF7F2" stroke="#ddd" stroke-width="0.3"/>
    <rect x="25" y="-3" width="10" height="6" fill="#E8E6E1"/>
    <rect x="37" y="-3" width="10" height="6" fill="#2D5F3F"/>
    <rect x="49" y="-3" width="10" height="6" fill="#4A6B4F"/>
    <rect x="61" y="-3" width="10" height="6" fill="#8FB573"/>
    <rect x="73" y="-3" width="10" height="6" fill="#6FA88A"/>
    <rect x="85" y="-3" width="10" height="6" fill="#2C3E50"/>
  </g>
  <text x="150" y="695"
        fill="#8B7355"
        font-family="STSong, SimSun, serif"
        font-size="9"
        font-weight="500"
        text-anchor="middle"
        letter-spacing="3">19 SHADES OF THE EAST</text>

  <!-- 底部装饰线 -->
  <line x1="100" y1="730" x2="200" y2="730" stroke="#D4AF37" stroke-width="1.5"/>
  <circle cx="80" cy="730" r="3" fill="#D4AF37"/>
  <circle cx="220" cy="730" r="3" fill="#D4AF37"/>

</svg>
