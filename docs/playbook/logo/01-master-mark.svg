<?xml version="1.0" encoding="UTF-8"?>
<!--
  渝山东方美学 · 主标识 LOGO（核心 IP，方版）
  Master Mark · v1.0 · 2026-05-17

  色谱母本：swatch-builder/palette/colors.yaml
    朱砂 #C0392B  ★ 印章主色
    米白 #FAF7F2  反白字
    墨青 #2C3E50  外圈细描边
    暖驼 #C9A66B  方印边角晕染

  设计逻辑：
  - 中心为朱砂方印「渝山」（双字纵向），最具识别度
  - 印章周围一圈极淡米麦水墨晕染（呼吸感）
  - 外围墨青细圆环 0.3mm，给方印一个收口
  - 整体保持「克制 + 留白」的东方美学调性

  使用尺寸：
  - 头像 / 公众号 / 小红书：512×512 直接用
  - 微信视频号头像：512×512
  - 名片 / 印刷：导出 1024×1024 PNG @ 300dpi
  - 包装贴 / 封蜡贴：导出 SVG 直接矢量印
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">

  <!-- 圆形米白底 -->
  <circle cx="256" cy="256" r="254" fill="#FAF7F2" stroke="#2C3E50" stroke-width="2"/>

  <!-- 米麦水墨晕染（径向渐变，模拟宣纸吸水的柔和过渡） -->
  <defs>
    <radialGradient id="ink-wash" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F5E6C8" stop-opacity="0.65"/>
      <stop offset="30%" stop-color="#F5E6C8" stop-opacity="0.35"/>
      <stop offset="55%" stop-color="#F5E6C8" stop-opacity="0.10"/>
      <stop offset="75%" stop-color="#F5E6C8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="seal-grain" cx="25%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.06"/>
      <stop offset="35%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="seal-grain-2" cx="75%" cy="70%" r="60%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.06"/>
      <stop offset="35%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <filter id="seal-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#C0392B" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- 印章周围水墨晕染 -->
  <circle cx="256" cy="256" r="210" fill="url(#ink-wash)"/>

  <!-- 朱砂方印（微旋 -2 度，模拟手盖印泥的真实感） -->
  <g transform="translate(256 256) rotate(-2)" filter="url(#seal-shadow)">
    <!-- 印面 -->
    <rect x="-150" y="-150" width="300" height="300" fill="#C0392B"/>
    <!-- 印面纹理（模拟印泥不均匀） -->
    <rect x="-150" y="-150" width="300" height="300" fill="url(#seal-grain)"/>
    <rect x="-150" y="-150" width="300" height="300" fill="url(#seal-grain-2)"/>
    <!-- 阴文反白字「渝山」纵向双字 -->
    <text x="0" y="-30"
          fill="#FAF7F2"
          font-family="STKaiti, KaiTi, STSong, SimSun, serif"
          font-size="124"
          font-weight="900"
          text-anchor="middle"
          dominant-baseline="middle">渝</text>
    <text x="0" y="90"
          fill="#FAF7F2"
          font-family="STKaiti, KaiTi, STSong, SimSun, serif"
          font-size="124"
          font-weight="900"
          text-anchor="middle"
          dominant-baseline="middle">山</text>
  </g>

</svg>
