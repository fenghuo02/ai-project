<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Cover 01 - 主封面</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #f0f0f0; display: flex; justify-content: center; padding: 20px; font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; }
  .cover {
    width: 621px; height: 828px;
    background: #FFF8E7;
    position: relative;
    overflow: hidden;
    box-shadow: 0 8px 30px rgba(0,0,0,0.15);
  }
  .tag {
    position: absolute; top: 40px; right: 40px;
    background: #FF6B6B; color: white;
    padding: 10px 24px; border-radius: 100px;
    font-weight: 800; font-size: 22px;
    transform: rotate(8deg);
    box-shadow: 0 4px 12px rgba(255,107,107,0.3);
  }
  .small-title {
    position: absolute; top: 90px; left: 60px;
    font-size: 32px; color: #FF6B6B;
    font-weight: 700;
  }
  .main-block {
    position: absolute; top: 180px; left: 40px; right: 40px;
    background: #FFD93D;
    padding: 50px 30px;
    border-radius: 24px;
    box-shadow: 8px 8px 0 #2D2D2D;
  }
  .main-title {
    font-size: 120px; font-weight: 900;
    color: #2D2D2D;
    line-height: 1; letter-spacing: -2px;
    text-align: center;
  }
  .main-sub {
    font-size: 38px; color: #2D2D2D;
    text-align: center;
    margin-top: 16px;
    font-weight: 700;
  }
  .subtitle {
    position: absolute; top: 520px; left: 60px; right: 60px;
    font-size: 44px; font-weight: 800;
    color: #2D2D2D;
    line-height: 1.3;
  }
  .fire { color: #FF6B6B; }
  .emoji-row {
    position: absolute; top: 640px; left: 60px; right: 60px;
    display: flex; justify-content: space-around;
    font-size: 56px;
  }
  .bottom-badge {
    position: absolute; bottom: 40px; left: 50%;
    transform: translateX(-50%);
    background: #2D2D2D; color: #FFD93D;
    padding: 14px 32px; border-radius: 100px;
    font-size: 24px; font-weight: 700;
    letter-spacing: 2px;
  }
  .dot-1 { position:absolute; top: 150px; left: 30px; width: 20px; height:20px; background:#6BCF7E; border-radius:50%; }
  .dot-2 { position:absolute; top: 60px; left: 40%; width: 14px; height:14px; background:#FF6B6B; border-radius:50%; }
  .dot-3 { position:absolute; bottom: 130px; right: 40px; width: 24px; height:24px; background:#6BCF7E; border-radius:50%; }
</style>
</head>
<body>
<div class="cover">
  <div class="tag">干货!</div>
  <div class="dot-1"></div>
  <div class="dot-2"></div>
  <div class="dot-3"></div>
  <div class="small-title">⚡ 打工人必装</div>
  <div class="main-block">
    <div class="main-title">5个</div>
    <div class="main-title" style="font-size:80px;margin-top:10px;">AI 神器</div>
    <div class="main-sub">用过真的回不去</div>
  </div>
  <div class="subtitle">准点下班的<br>秘密武器<span class="fire">🔥</span></div>
  <div class="emoji-row">
    <span>🤖</span><span>✍️</span><span>🎨</span><span>🎤</span><span>🔍</span>
  </div>
  <div class="bottom-badge">#AI工具测评</div>
</div>
</body>
</html>
