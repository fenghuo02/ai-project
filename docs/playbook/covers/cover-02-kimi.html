<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Cover 02 - Kimi</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #f0f0f0; display: flex; justify-content: center; padding: 20px; font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; }
  .cover {
    width: 621px; height: 828px;
    background: #FFF8E7;
    position: relative;
    overflow: hidden;
    box-shadow: 0 8px 30px rgba(0,0,0,0.15);
  }
  .no {
    position: absolute; top: 50px; left: 60px;
    font-size: 100px; font-weight: 900;
    color: #FFD93D;
    line-height: 1;
    -webkit-text-stroke: 3px #2D2D2D;
  }
  .no-label {
    position: absolute; top: 55px; left: 220px;
    background: #FF6B6B; color: white;
    padding: 8px 20px; border-radius: 100px;
    font-size: 22px; font-weight: 700;
  }
  .tool-head {
    position: absolute; top: 210px; left: 60px; right: 60px;
    display: flex; align-items: center; gap: 20px;
  }
  .tool-icon {
    font-size: 80px;
    background: #FFD93D;
    width: 120px; height: 120px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 30px;
    box-shadow: 6px 6px 0 #2D2D2D;
  }
  .tool-name {
    font-size: 72px; font-weight: 900;
    color: #2D2D2D;
  }
  .main-block {
    position: absolute; top: 380px; left: 40px; right: 40px;
    background: white;
    padding: 40px 30px;
    border-radius: 24px;
    border: 4px solid #2D2D2D;
    box-shadow: 8px 8px 0 #FFD93D;
  }
  .main-line-1 {
    font-size: 68px; font-weight: 900;
    color: #2D2D2D; text-align: center;
    line-height: 1.1;
  }
  .arrow {
    font-size: 44px; text-align: center;
    color: #FF6B6B;
    margin: 10px 0;
  }
  .main-line-2 {
    font-size: 68px; font-weight: 900;
    color: #FF6B6B; text-align: center;
    line-height: 1.1;
  }
  .tags {
    position: absolute; bottom: 80px; left: 60px; right: 60px;
    display: flex; flex-direction: column; gap: 14px;
  }
  .tag-item {
    font-size: 28px; color: #2D2D2D;
    font-weight: 700;
  }
  .tag-item::before {
    content: "✓  ";
    color: #6BCF7E;
    font-weight: 900;
  }
</style>
</head>
<body>
<div class="cover">
  <div class="no">01</div>
  <div class="no-label">KIMI</div>
  <div class="tool-head">
    <div class="tool-icon">🤖</div>
    <div class="tool-name">Kimi</div>
  </div>
  <div class="main-block">
    <div class="main-line-1">50 页合同</div>
    <div class="arrow">↓</div>
    <div class="main-line-2">3 分钟看完</div>
  </div>
  <div class="tags">
    <div class="tag-item">长文总结神器, 告别逐字读</div>
    <div class="tag-item">完全免费, 中文最友好</div>
    <div class="tag-item">甲方合同/论文/报告 通吃</div>
  </div>
</div>
</body>
</html>
