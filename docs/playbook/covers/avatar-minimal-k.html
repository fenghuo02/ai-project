<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>小红书头像 - 极简大K版（方案6）</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: linear-gradient(135deg, #f5f5f5, #e0e0e0);
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 40px;
    font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
  }
  .tip {
    color: #888; font-size: 14px; margin-bottom: 20px; text-align: center;
  }
  .tip strong { color: #FF6B6B; }
  .avatar-wrap {
    background: white; padding: 30px; border-radius: 24px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.1);
  }
  .avatar {
    width: 512px; height: 512px;
    border-radius: 50%;
    background: #000000;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .k {
    font-size: 400px; font-weight: 900;
    color: #FFD93D;
    line-height: 1;
    text-shadow:
      8px 8px 0 rgba(255,107,107,0.6),
      16px 16px 0 rgba(107,207,126,0.4);
    margin-top: -30px;
    font-family: 'Arial Black', sans-serif;
  }
  .slogan {
    font-size: 32px;
    color: #FFD93D;
    font-weight: 700;
    margin-top: 30px;
    letter-spacing: 4px;
    background: #FFD93D22;
    padding: 8px 24px;
    border-radius: 100px;
    border: 2px solid #FFD93D;
  }
  .corner-dots {
    position: absolute;
    width: 8px; height: 8px;
    background: #FFD93D;
    border-radius: 50%;
  }
  .c1 { top: 80px; right: 100px; }
  .c2 { top: 150px; left: 80px; }
  .c3 { bottom: 80px; right: 120px; }
  .c4 { bottom: 120px; left: 100px; }
</style>
</head>
<body>
  <div class="tip">
    💡 <strong>保存方式</strong>：右键点击头像 → 保存图片为 ... → 命名 avatar.png
  </div>
  <div class="avatar-wrap">
    <div class="avatar">
      <div class="corner-dots c1"></div>
      <div class="corner-dots c2"></div>
      <div class="corner-dots c3"></div>
      <div class="corner-dots c4"></div>
      <div class="k">K</div>
      <div class="slogan">AI · 打工搭子</div>
    </div>
  </div>
</body>
</html>
