<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>小红书头像 - 文字Logo版（方案2）</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: linear-gradient(135deg, #f5f5f5, #e0e0e0);
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 40px;
    font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
  }
  .tip {
    color: #888; font-size: 14px; margin-bottom: 20px; text-align: center;
  }
  .tip strong { color: #FF6B6B; }
  .avatar-wrap {
    background: white; padding: 30px; border-radius: 24px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.1);
  }
  .avatar {
    width: 512px; height: 512px;
    border-radius: 50%;
    background: #2D2D2D;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .dots {
    position: absolute; inset: 0;
    background-image: radial-gradient(#FFD93D22 2px, transparent 2px);
    background-size: 30px 30px;
  }
  .emoji {
    position: absolute;
    top: 80px; right: 90px;
    font-size: 80px;
    transform: rotate(20deg);
    filter: drop-shadow(3px 3px 0 rgba(255,217,61,0.5));
  }
  .main {
    font-size: 220px; font-weight: 900;
    color: #FFD93D;
    line-height: 1; letter-spacing: -10px;
    text-shadow: 6px 6px 0 rgba(107,207,126,0.4);
    z-index: 2;
  }
  .sub {
    font-size: 38px; color: #FFF8E7;
    font-weight: 700; letter-spacing: 6px;
    margin-top: 30px; z-index: 2;
    border-top: 3px solid #FFD93D;
    padding-top: 18px;
  }
  .corner-deco-1 {
    position: absolute; top: 60px; left: 60px;
    width: 50px; height: 50px;
    border: 6px solid #FF6B6B;
    border-radius: 50%;
    z-index: 1;
  }
  .corner-deco-2 {
    position: absolute; bottom: 70px; right: 70px;
    width: 30px; height: 30px;
    background: #6BCF7E;
    border-radius: 50%;
    z-index: 1;
  }
</style>
</head>
<body>
  <div class="tip">
    💡 <strong>保存方式</strong>：右键点击头像 → 保存图片为 ... → 命名 avatar.png
  </div>
  <div class="avatar-wrap">
    <div class="avatar">
      <div class="dots"></div>
      <div class="corner-deco-1"></div>
      <div class="corner-deco-2"></div>
      <div class="emoji">🚀</div>
      <div class="main">小K</div>
      <div class="sub">AI · 工具箱</div>
    </div>
  </div>
</body>
</html>
