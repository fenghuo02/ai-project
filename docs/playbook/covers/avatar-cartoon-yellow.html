<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>小红书头像 - 卡通黄底版（方案1 简化版）</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: linear-gradient(135deg, #f5f5f5, #e0e0e0);
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 40px;
    font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
  }
  .tip {
    color: #888; font-size: 14px; margin-bottom: 20px; text-align: center;
  }
  .tip strong { color: #FF6B6B; }
  .avatar-wrap {
    background: white; padding: 30px; border-radius: 24px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.1);
  }
  .avatar {
    width: 512px; height: 512px;
    border-radius: 50%;
    background: #FFD93D;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    position: relative;
    overflow: hidden;
    border: 6px solid #2D2D2D;
  }
  /* 头发 */
  .hair {
    position: absolute;
    top: 110px;
    width: 240px; height: 120px;
    background: #2D2D2D;
    border-radius: 120px 120px 0 0;
  }
  /* 脸 */
  .face {
    position: absolute;
    top: 180px;
    width: 240px; height: 240px;
    background: #FFE4B5;
    border-radius: 50%;
    border: 6px solid #2D2D2D;
  }
  /* 眼睛 */
  .eye {
    position: absolute;
    top: 260px;
    width: 24px; height: 8px;
    background: #2D2D2D;
    border-radius: 10px;
  }
  .eye-left { left: calc(50% - 60px); }
  .eye-right { right: calc(50% - 60px); }
  /* 腮红 */
  .cheek {
    position: absolute;
    top: 300px;
    width: 30px; height: 16px;
    background: #FF6B6B;
    border-radius: 50%;
    opacity: 0.6;
  }
  .cheek-left { left: calc(50% - 88px); }
  .cheek-right { right: calc(50% - 88px); }
  /* 嘴巴 */
  .mouth {
    position: absolute;
    top: 320px;
    width: 40px; height: 20px;
    border-bottom: 6px solid #2D2D2D;
    border-radius: 50%;
    border-top: none;
    left: 50%;
    transform: translateX(-50%);
  }
  /* 耳机 */
  .headphone {
    position: absolute;
    top: 150px;
    width: 260px; height: 30px;
    border-top: 8px solid #2D2D2D;
    border-radius: 50%;
    left: 50%;
    transform: translateX(-50%);
  }
  .headphone-ear-l, .headphone-ear-r {
    position: absolute;
    top: 230px;
    width: 36px; height: 44px;
    background: #FF6B6B;
    border: 5px solid #2D2D2D;
    border-radius: 20px;
  }
  .headphone-ear-l { left: calc(50% - 130px); }
  .headphone-ear-r { right: calc(50% - 130px); }
  /* T恤 */
  .tshirt {
    position: absolute;
    bottom: -80px;
    width: 360px;
    height: 200px;
    background: #FFF8E7;
    border-radius: 180px 180px 0 0;
    border: 6px solid #2D2D2D;
    display: flex; align-items: flex-start;
    justify-content: center;
    padding-top: 50px;
  }
  .k-letter {
    font-size: 80px; font-weight: 900;
    color: #2D2D2D;
    line-height: 1;
  }
  /* 装饰星 */
  .star {
    position: absolute;
    font-size: 30px;
  }
  .star-1 { top: 60px; right: 80px; transform: rotate(15deg); }
  .star-2 { top: 200px; left: 60px; transform: rotate(-20deg); }
  .star-3 { bottom: 180px; right: 60px; transform: rotate(25deg); }
</style>
</head>
<body>
  <div class="tip">
    💡 <strong>保存方式</strong>：右键点击头像 → 保存图片为 ... → 命名 avatar.png
  </div>
  <div class="avatar-wrap">
    <div class="avatar">
      <div class="star star-1">✨</div>
      <div class="star star-2">💡</div>
      <div class="star star-3">⚡</div>
      <div class="hair"></div>
      <div class="face"></div>
      <div class="headphone"></div>
      <div class="headphone-ear-l"></div>
      <div class="headphone-ear-r"></div>
      <div class="eye eye-left"></div>
      <div class="eye eye-right"></div>
      <div class="cheek cheek-left"></div>
      <div class="cheek cheek-right"></div>
      <div class="mouth"></div>
      <div class="tshirt">
        <div class="k-letter">K</div>
      </div>
    </div>
  </div>
</body>
</html>
