<?xml version="1.0" encoding="UTF-8"?>
<!--
  @Skub0k profile avatar · v1.0 · 2026-05-30
  monogram "S /" inside circular frame.
  S = Skub. / = decoder/separator/observation cut.
  black & white only. anti-AI, anti-gradient, anti-3D.
  recommended export: 400x400 PNG (X profile pic)
  also legible at 48x48 (timeline thumbnail).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">

  <!-- white square background (X requires square upload) -->
  <rect x="0" y="0" width="400" height="400" fill="#ffffff"/>

  <!-- main circular frame, ink stroke -->
  <circle cx="200" cy="200" r="178" fill="#ffffff" stroke="#111111" stroke-width="10"/>

  <!-- monogram "S /" -->
  <!--
    Using system sans because X compresses heavily; system fallback
    is more robust than embedded webfonts. Render via browser
    screenshot or open in design tool that respects system fonts.
  -->
  <g font-family="-apple-system, BlinkMacSystemFont, Inter, 'Helvetica Neue', sans-serif"
     font-weight="800"
     font-size="220"
     fill="#111111"
     letter-spacing="-12">
    <text x="200" y="270" text-anchor="middle">S/</text>
  </g>

  <!-- subtle handle stamp at bottom (only visible at full size) -->
  <g font-family="'SF Mono', Menlo, Monaco, Consolas, monospace"
     font-size="14"
     fill="#999999"
     letter-spacing="1">
    <text x="200" y="365" text-anchor="middle">@Skub0k</text>
  </g>

</svg>
