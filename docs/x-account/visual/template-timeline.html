<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>E5-c · Timeline Template · @Skub0k</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 1080px; height: 1350px;
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif;
      color: #111; background: #fff;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }
    .frame {
      width: 1080px; height: 1350px;
      padding: 64px 72px;
      display: flex; flex-direction: column;
    }

    /* HEADER */
    h1 {
      font-size: 28pt; font-weight: 800; letter-spacing: -0.6pt;
      line-height: 1.15;
    }
    .subtitle {
      font-size: 13pt; color: #666; margin-top: 8pt;
      letter-spacing: 0.2pt;
    }
    .rule {
      width: 100%; height: 1.5pt; background: #111;
      margin: 28pt 0 32pt;
    }

    /* TIMELINE */
    .timeline {
      list-style: none;
    }
    .event {
      display: flex; align-items: baseline; gap: 18pt;
      padding: 14pt 0;
      border-bottom: 1px dashed #eeeeee;
    }
    .event:last-child { border-bottom: none; }

    .date {
      font-family: 'SF Mono', Menlo, Monaco, Consolas, monospace;
      font-size: 14pt; color: #111;
      width: 78pt; flex-shrink: 0; font-weight: 600;
    }
    .marker {
      font-size: 16pt; line-height: 1;
      width: 22pt; flex-shrink: 0; text-align: center;
      color: #111;
    }
    .event-text {
      font-size: 14pt; line-height: 1.4;
      flex: 1;
    }
    .upcoming {
      color: #cc0000; font-size: 10pt; font-weight: 600;
      letter-spacing: 0.3pt; text-transform: uppercase;
      margin-left: 14pt;
    }

    /* TAKEAWAY */
    .takeaway {
      margin-top: 32pt;
      padding: 22pt 28pt;
      background: #f8f8f8;
      border-left: 3pt solid #111;
      font-style: italic;
      font-size: 14pt; line-height: 1.6;
      color: #222;
    }

    /* BOTTOM */
    .bottom-row {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-top: auto; padding-top: 20pt;
      border-top: 1px solid #eeeeee;
    }
    .label {
      font-size: 9pt; color: #666; letter-spacing: 0.4pt;
      text-transform: uppercase;
    }
    .handle {
      font-family: 'SF Mono', Menlo, Monaco, Consolas, monospace;
      font-size: 12pt; color: #666; letter-spacing: 0.3pt;
    }
  </style>
</head>
<body>
  <div class="frame">

    <div>
      <h1>[[TITLE]]</h1>
      <div class="subtitle">[[SUBTITLE]]</div>
    </div>

    <div class="rule"></div>

    <ul class="timeline">
      <li class="event">
        <span class="date">[[D1]]</span>
        <span class="marker">●</span>
        <span class="event-text">[[E1]]</span>
      </li>
      <li class="event">
        <span class="date">[[D2]]</span>
        <span class="marker">●</span>
        <span class="event-text">[[E2]]</span>
      </li>
      <li class="event">
        <span class="date">[[D3]]</span>
        <span class="marker">●</span>
        <span class="event-text">[[E3]]</span>
      </li>
      <li class="event">
        <span class="date">[[D4]]</span>
        <span class="marker">●</span>
        <span class="event-text">[[E4]]</span>
      </li>
      <li class="event">
        <span class="date">[[D5]]</span>
        <span class="marker">●</span>
        <span class="event-text">[[E5]]</span>
      </li>
      <li class="event">
        <span class="date">[[D6]]</span>
        <span class="marker">○</span>
        <span class="event-text">[[E6]]<span class="upcoming">← upcoming</span></span>
      </li>
      <li class="event">
        <span class="date">[[D7]]</span>
        <span class="marker">○</span>
        <span class="event-text">[[E7]]<span class="upcoming">← upcoming</span></span>
      </li>
    </ul>

    <div class="takeaway">
      [[TAKEAWAY]]
    </div>

    <div class="bottom-row">
      <div class="label">observer &amp; investor</div>
      <div class="handle">@Skub0k</div>
    </div>

  </div>
</body>
</html>
