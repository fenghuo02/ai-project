# ============================================================
# 终章·命书后记
# ============================================================
afterword:
  big_quote_1: "<上联 · 8-12 字>"
  big_quote_2: "<下联 · 8-12 字>"
  letter: |
    <主理人致客户的信，6-10 行。
     必须涉及：本命色 / 印章因 ta 而刻 / 不是判词是色彩自传>
  signature: "—— 主理人 拜"
  next_year_hook: |
    <为续约埋伏笔，2-4 行>

