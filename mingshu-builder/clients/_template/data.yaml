# 客户档案 · 模板
# ============================================================
# 用法：
#   1. cp -r clients/_template clients/<客户ID>
#      建议 <客户ID> 形如：王晓-19920315
#   2. 把下方所有 <尖括号> 占位符替换成真实数据
#   3. 把客户图片放进 clients/<客户ID>/images/
#      命名规则见 mingshu-builder/README.md（portrait / sheng / kai …）
#   4. python3 build.py --validate <客户ID>     # 先验证字段齐不齐
#   5. python3 build.py <客户ID>                # 没问题再正式生成
#
# ⚠️ 内容合规：所有"客户对外可见"的字段绝不出现
#    算命/看相/八字/用神/调候/命格/奇门/八门/死门/惊门
# 内部工作字段（bazi.*）不上印刷品，可保留专业术语。
# ============================================================

meta:
  client_id: "<客户ID>"             # 同目录名
  client_name: "<客户姓名>"         # 用于书名 + 致辞 + 印章
  client_seal_char: "<姓>"          # 印章一字，常用姓氏首字
  edition: "No.001 / 2026"
  year_label: "丙午年仲春"
  book_color_name: "<主色名>"       # 决定书名《X之书》，如"暖驼"

# ============================================================
# 命局基底（来自 docs/playbook/prompts-yixue-photo.md · Prompt 1 v2.0 推导）
# ⚠️ 此段为内部工作字段，不会出现在 PDF 客户面页
# ============================================================
bazi:
  pillars:
    nian: "<甲乙丙丁戊己庚辛壬癸>+<子丑寅卯辰巳午未申酉戌亥>"
    yue:  "<同上>"
    ri:   "<同上>"
    shi:  "<同上>"
  five_elements:
    nian: "<两字>"                  # 如：土土
    yue:  "<两字>"
    ri:   "<两字>"
    shi:  "<两字>"
  ri_zhu: "<日干 + 五行>"           # 如：壬水
  yue_ling: "<月支>"                # 如：申
  season: "<孟仲季 + 春夏秋冬>"     # 如：孟秋
  body_strength: "<旺/相/休/囚/死/中和偏强 …>"
  yongshen: ["<五行天干>", "<五行天干>"]   # 调候用神，1-2 个
  type_label: "<命局一句话画像>"    # 如：秋水待暖 · 堤岸黄昏

# ============================================================
# 本命色（出现在第二卷 · 本命色谱 + 附录·二）
# ⚠️ HEX 必须 7 位（# + 6 位）；与 swatch-builder/palette/colors.yaml 保持一致
# ============================================================
colors:
  primary:                          # 主色 2 个
    - name: "<主色名>"              # 如：暖驼
      hex: "#<6位16进制>"           # 如：#C9A66B
      en: "<英文名>"                # 如：Warm Camel
      desc: "<一句感官化描述>"
      uses:
        - { tag: "穿", text: "<3-5 件穿搭意象>" }
        - { tag: "居", text: "<2-3 处家居意象>" }
        - { tag: "器", text: "<2-3 件器物意象>" }
      meaning: |
        <4-7 行多行解读，向客户讲为什么这是 ta 的本命主色。
         不出现命理术语，用感官 + 故事化语言。>
    - name: "<主色 2 名>"
      hex: "#<6位>"
      en: "<英文名>"
      desc: "<一句>"
      uses:
        - { tag: "穿", text: "<3-5 件>" }
        - { tag: "居", text: "<2-3 处>" }
        - { tag: "器", text: "<2-3 件>" }
      meaning: |
        <4-7 行解读>
  secondary:                        # 辅色 1 个
    name: "<辅色名>"
    hex: "#<6位>"
    en: "<英文名>"
    desc: "<一句感官描述>"
  forbidden:                        # 避忌色 1 个
    name: "<避忌色名>"
    hex: "#<6位>"
    en: "<英文名>"
    desc: "<温柔说为什么不合适，不带否定>"
    note: "<一句具体的避免建议>"

# ============================================================
# 性格关键词（命主画像页用）
# ============================================================
personality:
  summary: |
    <3-5 行命主画像总论 · 意象化 · 不直白>
  keywords:                         # 5 个关键词
    - { cn: "<两字>", en: "<英文大写>" }
    - { cn: "<两字>", en: "<英文大写>" }
    - { cn: "<两字>", en: "<英文大写>" }
    - { cn: "<两字>", en: "<英文大写>" }
    - { cn: "<两字>", en: "<英文大写>" }
  description: |
    <2-4 行 · 性格白描第一段>
  description_2: |
    <2-4 行 · 性格白描第二段（聚焦"调候"层面，但不出现术语）>

# ============================================================
# 应景之物（香 / 茶 / 色 / 时 + 5 件日常物）
# ============================================================
lifestyle:
  xiang:
    title: "应景之香"
    item: "<具体香名>"               # 如：沉香 · 老山
    text: "<一句解读：为什么这香合 ta 的命局>"
  cha:
    title: "应景之茶"
    item: "<具体茶名>"
    text: "<一句解读>"
  se:
    title: "应景之色"
    item: "<家居 / 服饰 / 配件>"
    text: "<一句具体建议>"
  shi:
    title: "应景之时"
    item: "<两个时辰，如：未时 · 酉时>"
    text: "<一句解读：何时最旺、何时宜静>"
  daily_items:                      # 5 件
    - "<日常物 1：穿搭>"
    - "<日常物 2：书桌>"
    - "<日常物 3：文具>"
    - "<日常物 4：仪式>"
    - "<日常物 5：记事>"

aesthetic_signature: |
  <4-6 行短诗，命主美学签名 · 出现在第一卷末页大字>

# ============================================================
# 穿搭红黑榜（5 + 5）
# ============================================================
wardrobe:
  red_list:
    - "<推荐穿搭组合 1>"
    - "<推荐穿搭组合 2>"
    - "<推荐穿搭组合 3>"
    - "<推荐穿搭组合 4>"
    - "<推荐穿搭组合 5>"
  black_list:
    - "<避免穿搭 1>"
    - "<避免穿搭 2>"
    - "<避免穿搭 3>"
    - "<避免穿搭 4>"
    - "<避免穿搭 5>"

# ============================================================
# 序章·缘起（主理人书信，~200 字）
# ============================================================
preface: |
  这是写给你的一本书。

  <第二段：客户出生时刻的诗化描述 + 命局精炼一句>

  <第三段：声明这本书"不是预测、是色彩之镜"的承诺>

  愿你看完这本书时，
  认出画里的人，是你自己。

# ============================================================
# 八门（人生八境）· 8 个场景
# ============================================================
# 必须保留 8 个 id（顺序固定）：kai / xiu / sheng / shang / du / jing / si_men / jing_men
# 每个场景对应客户 images/ 里同名的图片（找不到时用 deco_char 大字 + 渐变 fallback）
# 选 1 门为 is_best: true（"你的最佳匹配"），其它都 false
# ============================================================
ba_men:
  - id: "kai"
    name: "事业开拓"
    en: "Career · Dawn Light"
    deco_char: "开"
    color_1: "#<6位>"                # 主色调
    color_2: "#<6位>"                # 辅色（fallback 渐变下半）
    label: "<时辰意象>"              # 如：卯时破晓
    quote: "<一句金句>"
    uses:                            # 5 个适用场景
      - "<场景 1>"
      - "<场景 2>"
      - "<场景 3>"
      - "<场景 4>"
      - "<场景 5>"
    rituals:                         # 3 步配套小仪式
      - "① <仪式 1>"
      - "② <仪式 2>"
      - "③ <仪式 3>"
    egg: ""                          # 客户专属彩蛋（只在 is_best 那门写，其他留空）
    pengyouquan: "<一句朋友圈金句>"
    is_best: false

  - id: "xiu"
