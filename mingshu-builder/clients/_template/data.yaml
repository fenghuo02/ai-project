# ============================================================
# 七节日
# ============================================================
festivals:
  - id: "chuxi"
    name: "除夕"
    title: "除夕 · 万家灯火"
    en: "Lunar New Year's Eve · Lanterns Aglow"
    deco_char: "夕"
    color_1: "#C0392B"
    color_2: "#D4AF37"
    label: "守岁烛光"
    origin: |
      除夕的核心是"守"——守住一年的最后一束光，
      也守住自己一年里好的部分。
      你的命局里光本就稀少，
      所以这一夜的灯，对你格外温柔。
    color_text: "暖红 #C0392B + 烛光金 #D4AF37 + 你的暖驼"
    actions:
      - "把家里所有冷光灯换成暖光"
      - "给三个最重要的人发去一句不说节日吉祥的话"
      - "亥时之前，给自己沏最后一壶茶"
    pengyouquan: "守住的，从来不是岁，是自己。"

  - id: "chunjie"
    name: "春节"
    title: "春节 · 红梅初绽"
    en: "Spring Festival · First Plum"
    deco_char: "春"
    color_1: "#C0392B"
    color_2: "#F5E6C8"
    label: "红墙肖像"
    origin: |
      春节的红，是一年之始的"火"。
      你不缺水，缺的就是这股火气。
      所以对你来说，春节穿红，
      不是随大流的吉庆，是真正的补益。
    color_text: "朱砂 #C0392B + 米白 #F5E6C8 + 你的烛金"
    actions:
      - "初一早上穿一件正红，哪怕只是一条围巾"
      - "初五前在书桌放一枝红梅"
      - "和家人吃饭时，主动多说三句话"
    pengyouquan: "冬天最怕的不是冷，是忘了给自己一束火。"

  - id: "yuanxiao"
    name: "元宵节"
    title: "元宵 · 千灯祈愿"
    en: "Lantern Festival · A Thousand Lights"
    deco_char: "灯"
    color_1: "#E67E22"
    color_2: "#FAF7F2"
    label: "灯下肖像"
    origin: |
      元宵是新年第一个月圆。
      古人在这一夜把心愿写在灯笼上，让光把愿望带走。
      对水型的你来说，月光有特殊的意义——
      它不是要烧掉什么，而是要把愿望"慢慢温热"。
    color_text: "暖红 #E67E22 + 月白 #FAF7F2"
    actions:
      - "煮一碗甜汤圆，慢慢吃完"
      - "把今年最想做成的一件事写下来，折成小方"
      - "夜里看一眼窗外的月，再睡"
    pengyouquan: "新年第一轮月，是要被认真看见的。"

  - id: "duanwu"
    name: "端午节"
    title: "端午 · 艾草江畔"
    en: "Dragon Boat Festival · Mugwort & River"
    deco_char: "艾"
    color_1: "#2D5F3F"
    color_2: "#C0392B"
    label: "艾草晨光"
    origin: |
      端午是夏至之前的"清正"之节。
      苍翠之木与朱砂之火相生，
      正合你命局里需要的'温润而有锋'。
      插一枝艾草，不是迷信，是对自己说：
      '我今年，不容易被冲昏头。'
    color_text: "苍翠 #2D5F3F + 朱砂 #C0392B"
    actions:
      - "在门口或工位放一束艾草（鲜或干都行）"
      - "中午阳气最盛时晒 10 分钟太阳"
      - "吃一只咸蛋黄粽，慢慢嚼完"
    pengyouquan: "做一个温润但有锋的人。"

  - id: "qixi"
    name: "七夕节"
    title: "七夕 · 银河鹊桥"
    en: "Qixi · Bridge of Stars"
    deco_char: "桥"
    color_1: "#F0A6A6"
    color_2: "#D4AF37"
    label: "戌时银河"
    origin: |
      七夕是中国的"星宿之夜"。
      古人讲究的不是买花送礼，
      而是在银河两端，让两个人都看到同一片星光。
      对你来说，这一晚最适合写一封信——
      不是给别人，是给三年后的自己。
    color_text: "粉霞 #F0A6A6 + 暖金 #D4AF37"
    actions:
      - "给三年后的自己写一封信"
      - "封口处盖你的本命色印章"
      - "封存到明信片盒里，三年后才打开"
    pengyouquan: "最浪漫的事，是有人和你看同一片星空。"

  - id: "zhongqiu"
    name: "中秋节"
    title: "中秋 · 月奉酒"
    en: "Mid-Autumn · Moonlit Toast"
    deco_char: "月"
    color_1: "#FAF7F2"
    color_2: "#D4AF37"
    label: "月下举杯"
    origin: |
      中秋始于上古祭月，唐宋时成为文人对"团圆"的祈愿。
      在你的命局里，月光本就稀少——
      所以这一天的月，对你格外珍贵。
    color_text: "月白 #FAF7F2 + 桂金 #D4AF37 + 你的暖驼"
    actions:
      - "阳台上煮一壶桂花茶"
      - "给三年后的自己写一封信，封口盖你的本命色印章"
      - "戌时推门出去，看一眼今晚的月"
    pengyouquan: "我们不缺月，缺的是抬头看月的那个瞬间。"

  - id: "chongyang"
    name: "重阳节"
    title: "重阳 · 黄菊远山"
    en: "Double Ninth · Chrysanthemum & Distant Hill"
    deco_char: "九"
    color_1: "#C9A66B"
    color_2: "#F4D03F"
    label: "山间登高"
    origin: |
      重阳是"九九"之日，古人在这一天登高、看菊花、喝菊酒，
      意思是站得高一点，看得远一点。
      你这一年走得快，今天不妨慢一慢。
      给一位长辈打个电话，比任何祈福都强。
    color_text: "暖驼 #C9A66B + 菊黄 #F4D03F"
    actions:
      - "给一位长辈或导师打个电话"
      - "登一次高（不必很高，一座小山即可）"
      - "晚上煮一壶菊花茶"
    pengyouquan: "走得再快，也别忘了回头看看那束陪你长大的光。"

# ============================================================
# 24 节气
# ============================================================
solar_terms:
  spring:
    title: "春之六节气"
    intro: "春属木，于你壬水而言，是泄秀的时候。少做躁进事，多做生发事。"
    items:
      - { id: "lichun",   name: "立春", date: "2/4",  poem: "东风带春信，万物苏其魂。", action: "立春这天，给自己换一条嫩绿丝巾。嫩绿不是你的本命色，但这天，万物都在向新色彩致意。" }
      - { id: "yushui",   name: "雨水", date: "2/19", poem: "春雨润无声，新柳生细芽。", action: "泡一壶龙井。雨水时节饮水，水更清。对你尤其有益。" }
      - { id: "jingzhe",  name: "惊蛰", date: "3/5",  poem: "春雷动九霄，蛰虫应时鸣。", action: "把上个月该说没说的话，今天说了。惊蛰宜动，动嘴最易。" }
      - { id: "chunfen",  name: "春分", date: "3/20", poem: "燕子归故园，玉兰开窗前。", action: "春分昼夜均长，最宜衡。盘点一下今年的事，砍掉一半。" }
      - { id: "qingming", name: "清明", date: "4/4",  poem: "烟雨润青团，故人在心边。", action: "清明适合慎独。花一个下午，回想一个离开的人。" }
      - { id: "guyu",     name: "谷雨", date: "4/20", poem: "雨生百谷，麦苗如荫。",     action: "在工位放一盆水养竹。谷雨后 30 天，看它怎么长。" }
  summer:
    title: "夏之六节气"
    intro: "夏属火，水火相济。你这季节'被照见'最多，记得收一收。"
    items:
      - { id: "lixia",    name: "立夏", date: "5/5",  poem: "樱桃枝头红，薄荷石上凉。", action: "换一个浅色的杯子，每天用它喝早水。" }
      - { id: "xiaoman",  name: "小满", date: "5/21", poem: "麦穗渐满仓，布谷催耕忙。", action: "小满不'盈'，留一分余地。今天不做满的事。" }
      - { id: "mangzhong",name: "芒种", date: "6/5",  poem: "麦熟谷新生，青梅落酒香。", action: "煮一壶青梅酒（无酒精也行），冰镇一夜。" }
      - { id: "xiazhi",   name: "夏至", date: "6/21", poem: "烈日当空照，莲花静自香。", action: "今天去看一片荷塘。不拍照，只看 10 分钟。" }
      - { id: "xiaoshu",  name: "小暑", date: "7/7",  poem: "蝉鸣午正酣，纸扇半开掩。", action: "睡一个舒服的午觉。这是夏天最该做的事。" }
      - { id: "dashu",    name: "大暑", date: "7/22", poem: "荷塘清茶冷，墨色入人心。", action: "今天只穿一身浅色，让眼睛先凉下来。" }
  autumn:
    title: "秋之六节气"
    intro: "秋属金，于你壬水是'根源'之季。秋天是你最好的状态。"
    items:
      - { id: "liqiu",    name: "立秋", date: "8/7",  poem: "桂花探初凉，金风渐入帘。", action: "立秋开始，可以重新穿你的暖驼了。它属于你的季节。" }
      - { id: "chushu",   name: "处暑", date: "8/23", poem: "残荷映晚风，余热终自收。", action: "把上半年没复盘的事，今天复盘完。" }
      - { id: "bailu",    name: "白露", date: "9/8",  poem: "露珠凝草尖，芦苇白江畔。", action: "白露之后，开始喝一点温的东西。让胃先安顿下来。" }
      - { id: "qiufen",   name: "秋分", date: "9/23", poem: "丹桂盛满枝，昼夜两相平。", action: "秋分日做'平衡'：写下今年的得失，各列五条。" }
      - { id: "hanlu",    name: "寒露", date: "10/8", poem: "红叶渐染山，菊花初上盘。", action: "今天买一枝菊花，放在书桌。" }
      - { id: "shuangjiang",name:"霜降",date: "10/23",poem: "霜叶红于二月花，柿子甜满枝头。", action: "煮一锅红色的甜汤——红枣、桂圆、红糖，给自己。" }
  winter:
    title: "冬之六节气"
    intro: "冬属水，于你是'本元'之季。但水太多反而要收，要藏。"
    items:
      - { id: "lidong",   name: "立冬", date: "11/7", poem: "初雪覆青瓦，暖炉煮旧书。", action: "把家里最厚的那条围巾，从衣柜深处翻出来用。" }
      - { id: "xiaoxue",  name: "小雪", date: "11/22",poem: "薄雪入夜下，围炉数旧梦。", action: "今天写一段'今年我做对的三件事'，简短即可。" }
      - { id: "daxue",    name: "大雪", date: "12/7", poem: "梅雪同时落，雪山映孤心。", action: "大雪日适合独处。看一部老电影。" }
      - { id: "dongzhi",  name: "冬至", date: "12/21",poem: "饺子热腾腾，阳光初回身。", action: "冬至吃饺子。这是一年里最'寒水待暖'的一天。" }
      - { id: "xiaohan",  name: "小寒", date: "1/5",  poem: "暖炉香腊梅，冷夜寄长信。", action: "煮一壶酒，写一封信。给一个今年只见过一次的朋友。" }
      - { id: "dahan",    name: "大寒", date: "1/20", poem: "红梅照雪开，暖光半山来。", action: "今天提前为来年的春节做一件小事，比如挑一副春联。" }

# ============================================================
# 终章
# ============================================================
afterword:
  big_quote_1: "色彩从来不是装饰"
  big_quote_2: "是一种自我宣告"
  letter: |
    这本书诞生于四十二日的阅读、推演、配色与校对。
    每一页的暖驼，都是我亲手调的；
    每一枚印章，都因你的姓氏而刻。

    它不是命运的判词，
    是你的色彩自传。

    愿你看完之后，
    认出画里的人，
    是你自己。
  signature: "—— 主理人 拜"
  next_year_hook: |
    明年这本书会更厚——
    因为你会有更多色彩。

