# ============================================================
# 七节日（除夕 / 春节 / 元宵 / 端午 / 七夕 / 中秋 / 重阳）
# 各节日 origin 和 actions 是赛道 IP，多客户通用，可保留主理人 demo 文案
# 但 color_text 必须替换为"客户主色 + 节日色"的组合
# ============================================================
festivals:
  - id: "chuxi"
    name: "除夕"
    title: "除夕 · 万家灯火"
    en: "Lunar New Year's Eve · Lanterns Aglow"
    deco_char: "夕"
    color_1: "#<6位>"
    color_2: "#<6位>"
    label: "<场景标签>"
    origin: |
      <可保留主理人 demo · 为节日通用 IP>
    color_text: "<节日色 + 客户主色 名+HEX 的组合句>"
    actions:
      - "<>"
      - "<>"
      - "<>"
    pengyouquan: "<金句>"

  # 其余 6 个节日同结构，建议直接复制主理人 demo 后只改 color_text + 个别 label
  # id: chunjie / yuanxiao / duanwu / qixi / zhongqiu / chongyang
  # 详细字段格式见 clients/主理人-19880808/data.yaml

