# ============================================================
# 客户档案模板（复制此目录后改名 + 改 data.yaml）
# ============================================================
# 用法：
#   cp -r clients/_template clients/<客户ID>
#   编辑 clients/<客户ID>/data.yaml
#   把客户图片放进 clients/<客户ID>/images/
#   python3 build.py <客户ID>
# ============================================================

# ============================================================
# 客户档案：主理人 · 1988-08-08 07:00
# ============================================================
# 注：所有"客户对外可见"的字段绝不出现"用神/调候/八字/算命"等术语
# ============================================================

meta:
  client_id: "主理人-19880808"
  client_name: "主理人"          # 客户姓名（用于书名印章和称呼）
  client_seal_char: "主"          # 印章上的一个字（推荐用姓氏首字）
  edition: "No.001 / 2026"        # 限量编号
  year_label: "丙午年仲春"        # 农历年份和季节
  book_color_name: "暖驼"         # 书的主题色名（书名《X之书》）

# ============================================================
# 命局基底（来自 Prompt 1 v2.0 推导）
# ============================================================
bazi:
  pillars:
    nian: "戊辰"
    yue:  "庚申"
    ri:   "壬午"
    shi:  "甲辰"
  five_elements:
    nian: "土土"
    yue:  "金金"
    ri:   "水火"
    shi:  "木土"
  ri_zhu: "壬水"
  yue_ling: "申"
  season: "孟秋"
  body_strength: "中和偏强"
  yongshen: ["戊土", "丁火"]
  type_label: "秋水待暖 · 堤岸黄昏"

# ============================================================
# 本命色
# ============================================================
colors:
  primary:
    - name: "暖驼"
      hex: "#C9A66B"
      en: "Warm Camel"
      desc: "秋天傍晚七点，麦田被染上的颜色。"
      uses:
        - { tag: "穿", text: "羊绒毛衣 / 茶歇裙 / 麂皮包" }
        - { tag: "居", text: "客厅主墙 / 暖光台灯" }
        - { tag: "器", text: "陶罐 / 铜盏 / 麻布" }
      meaning: |
        暖驼是你最该穿在身上的颜色。
        它不张扬，不热烈，
        它只在你走近时，让人觉得"这人很稳"。
        对于壬水日主来说，
        水太多时最缺的就是岸——
        暖驼，就是你的岸。
    - name: "烛光金"
      hex: "#D4AF37"
      en: "Candle Gold"
      desc: "冬至清晨第一缕阳光穿过窗纸的颜色。"
      uses:
        - { tag: "穿", text: "丝巾 / 耳钉 / 西装钮扣" }
        - { tag: "居", text: "台灯 / 蜡烛 / 黄铜器" }
        - { tag: "器", text: "金线书衣 / 鎏金盏" }
      meaning: |
        烛金不是炫耀的金。
        它是黄昏的光，是冬日窗纸后的暖意，
        是壬水命局里那个"藏而不透"的丁火。
        画面有一点烛金，气场立刻活了——
        不必多，恰到好处的一点，
        就像你说话的方式。
  secondary:
    name: "米白"
    hex: "#FAF7F2"
    en: "Cream White"
    desc: "不是冷白，是有呼吸的白。作底色，让你的暖色都活过来。"
  forbidden:
    name: "冰银"
    hex: "#A8B5C7"
    en: "Cold Silver"
    desc: "不是这色不美，是它不是为你而来。"
    note: "大面积冰蓝 / 纯黑 / 冷光银 穿上身，你会'失温'。"

# ============================================================
# 性格关键词（命主画像页用）
# ============================================================
personality:
  summary: |
    你是初秋黄昏时分的一条江——
    水波澄澈，
    需要一段暖色的堤岸，让流动有方向；
    需要一束晚霞，让清醒有温度。
  keywords:
    - { cn: "清醒", en: "CLEAR" }
    - { cn: "承载", en: "HOLDING" }
    - { cn: "温润", en: "GENTLE" }
    - { cn: "果决", en: "DECISIVE" }
    - { cn: "内秀", en: "INWARD" }
  description: |
    你对外清冷如水，内里却有一片厚实的土。
    你不擅长热烈表达，但你给别人的安心感
    是一种不容易被觉察、却一旦失去就会想念的存在。
  description_2: |
    你的火藏在午中，不炽烈，是烛光，是黄昏，
    是"该出手时稳稳地出，不该说话时静静地坐"的那种光。

# ============================================================
# 应景之物
# ============================================================
lifestyle:
  xiang:
    title: "应景之香"
    item: "沉香 · 老山"
    text: "不烈不甜，土沉合你的'堤岸'。书房一炉，静中见光。"
  cha:
    title: "应景之茶"
    item: "金骏眉 · 慢火"
    text: "暖金回甘，正是你的本命色。不喝红茶的水型人，今年试试。"
  se:
    title: "应景之色"
    item: "家居主色"
    text: "客厅一面暖驼主墙，书房用烛金灯光，卧室留一抹墨青收尾。"
  shi:
    title: "应景之时"
    item: "未时 · 酉时"
    text: "13-15 点处事最准；17-19 点闲坐最美。子时宜眠，亥时宜思。"
  daily_items:
    - "一盏暖驼色羊毛披肩，在会议室拿出，气场立刻不同"
    - "一只老铜镇纸，书桌一物，便有'定'气"
    - "一支墨青色钢笔，重要的决定用它落笔"
    - "一枚自制姓氏小印章，盖在每一封正式邮件附件上"
    - "一本麻面记事本，记下每天酉时的一句话"

aesthetic_signature: |
  水流不止
  因有岸

  光不孤独
  因有归处

# ============================================================
# 穿搭红黑榜
# ============================================================
wardrobe:
  red_list:
    - "米白棉麻衬衫 + 暖驼羊绒围巾"
    - "烛金色针织衫 + 麻面长裤"
    - "暖驼色西装外套 + 米白真丝内搭"
    - "朱砂点缀的暖色花衬衫"
    - "铜金色腕表 / 细金链"
  black_list:
    - "大面积冰蓝针织"
    - "纯黑高领毛衣（会压住气场）"
    - "荧光绿 / 高饱和湖蓝"
    - "冷银色西装（会显得疏离）"
    - "纯白 + 纯黑的极端对比"

# ============================================================
# 序章·缘起（主理人书信，200 字内）
# ============================================================
preface: |
  这是写给你的一本书。

  你出生在 1988 年立秋后第二日的清晨，
  壬水生于申月，命局里有源、有岸、有光。
  你不缺水，缺的是一束晚霞——
  让清醒的人有温度，让流动的水有方向。

  接下来的几十页，不是命运的预测，
  也不是谁替你下的判词。
  它只是一面色彩的镜子——
  把你天生就在的那束光，描出来。

  愿你看完这本书时，
  认出画里的人，是你自己。

# ============================================================
# 八门（人生八境）
# ============================================================
# 每个门：场景定位 / 适用时刻 / 配套仪式 / 客户专属彩蛋 / 朋友圈金句
# 命主信息：壬水日主，调候用神戊土+丁火，本命色 暖驼+烛光金
# ============================================================
ba_men:
  # 1. 开门 - 事业开拓 (金，西北)
  - id: "kai"
    name: "事业开拓"
    en: "Career · Dawn Light"
    deco_char: "开"
    color_1: "#D4AF37"
    color_2: "#C9A66B"
    label: "卯时破晓"
    quote: "有些光，是要主动去打开的。"
    uses:
      - "跳槽前夜，需要勇气"
      - "升职关键期，需要笃定"
      - "创业启动日，需要仪式"
      - "重要会议前，需要气场"
      - "新项目启动，需要破局之力"
    rituals:
      - "① 换上这张壁纸的当晚，给自己写一封'未来三个月'的信"
      - "② 信封口处盖一枚自己的姓氏小印"
      - "③ 第二天卯时起床，吃一顿暖色早餐再出门"
    egg: ""
    pengyouquan: "2026 重启的第一道光。"
    is_best: false

  # 2. 休门 - 深夜疗愈 (水，北)
  - id: "xiu"
    name: "深夜疗愈"
    en: "Healing · Moonlight"
    deco_char: "休"
    color_1: "#2C3E50"
    color_2: "#C9A66B"
    label: "亥时月光"
    quote: "今晚不焦虑，让月光帮我接住。"
    uses:
      - "焦虑期，需要被托住"
      - "失眠夜，需要一束暖光"
      - "复盘期，需要静水里的星光"
      - "高强度工作之后的一日歇"
      - "心绪过载，需要把自己'调小一档'"
    rituals:
      - "① 换上锁屏，把手机反扣"
      - "② 冲一杯不放糖的茶"
      - "③ 花十分钟，只是看着茶汤反射的光"
    egg: |
      水多的人未必需要更多水。
      但偶尔失眠、心绪过载的夜，
      可以换上这张——
      墨青里藏了一束你的本命暖驼月光，
      在不安里留一个小小的暖。
    pengyouquan: "静下来的时候，水才能照见星光。"
    is_best: false

  # 3. 生门 - 生意兴隆 (土，东北) - 最佳匹配
  - id: "sheng"
    name: "生意兴隆"
    en: "Abundance · Morning Wheat"
    deco_char: "生"
    color_1: "#C9A66B"
    color_2: "#F5E6C8"
    label: "辰时麦田"
    quote: "我的丰盛，从一束晨光里开始。"
    uses:
      - "谈合作、谈合同、谈钱的日子"
      - "新店开张、产品上线"
      - "跑业务、跑客户的早晨"
      - "个人品牌账号发布日"
      - "需要被'看见'的关键时刻"
    rituals:
      - "① 早上 7 点起床，先在阳台晒 5 分钟太阳"
      - "② 出门前换上暖驼色围巾或西装"
      - "③ 第一次开口说话之前，深呼吸三次"
    egg: |
      戊土年透 + 辰土双库，本就是你命局的中轴。
      当你"岸足够宽"的时候，水自然清澈、自然有余。
      这张壁纸的暖驼麦田，
      就是把你命局里的"岸"可视化了。
      所以这是八张里属于你的"那一张"。
    pengyouquan: "我的丰盛，从一束晨光里开始。"
    is_best: true

  # 4. 伤门 - 勇敢出击 (木，东)
  - id: "shang"
    name: "勇敢出击"
    en: "Decisive Action · Bamboo Arrow"
    deco_char: "伤"
    color_1: "#2D5F3F"
    color_2: "#C0392B"
    label: "寅时启动"
    quote: "该出手时，连风都为你让路。"
    uses:
      - "谈判前夜，需要有锋"
      - "比赛日，需要果决"
      - "维权时刻，需要不退"
      - "面对小人，需要一击即中"
      - "决定要做的事，今天就开始"
    rituals:
      - "① 把一件想做但拖延的事写在纸上"
      - "② 在最显眼的位置贴一周"
      - "③ 完成那一刻，把纸烧掉或撕成两半"
    egg: ""
    pengyouquan: "该出手时，连风都为你让路。"
    is_best: false

  # 5. 杜门 - 专注沉浸 (木，东南)
