    - "一只老铜暖手炉，桌上一物便有定气"
    - "一支红木镇纸，签字时压在纸角"
    - "一本麻面笔记本，记录每天午时的一句话"

aesthetic_signature: |
  秋叶落尽
  根更深

  火不必烈
  能焐心便是光

