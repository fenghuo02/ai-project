# ============================================================
# 本命色
# ============================================================
colors:
  primary:
    - name: "朱砂"
      hex: "#C0392B"
      en: "Vermillion"
      desc: "秋分日暮，朱漆门上最后一缕阳光的颜色。"
      uses:
        - { tag: "穿", text: "丝绒立领 / 朱红耳坠 / 红玛瑙串" }
        - { tag: "居", text: "客厅一抹朱漆 / 朱红老茶台" }
        - { tag: "器", text: "辰州朱砂印泥 / 朱漆描金匣" }
      meaning: |
        朱砂是你最该贴身的颜色。
        它不是节日的喜色，是从内里点燃的暖。
        秋天的土，金气太重，叶落太快——
        需要一束足够稳的火，把根重新焐热。
        朱砂，就是这束火。
        不必满身红，一枚耳坠、一抹胸前小印，
        气场立刻立起来。
    - name: "朱橘"
      hex: "#E67E22"
      en: "Cinnabar Orange"
      desc: "立秋初阳穿过柿子树叶的颜色。"
      uses:
        - { tag: "穿", text: "驼橘羊绒 / 焦糖色风衣 / 暖橘围巾" }
        - { tag: "居", text: "暖光台灯 / 橘色丝绒抱枕" }
        - { tag: "器", text: "陶土花器 / 老铜灯具" }
      meaning: |
        朱橘是朱砂的延展，
        比朱砂更温和，更日常。
        它是早晨第一缕阳光，是黄昏最后一抹暖——
        当你不便穿正红的时候，
        橘色就是替你点这把火的人。
  secondary:
    name: "暖驼"
    hex: "#C9A66B"
    en: "Warm Camel"
    desc: "秋日傍晚的麦田色。作根色，让你站得稳。"
  forbidden:
    name: "月光银"
    hex: "#E8E6E1"
    en: "Moonlight Silver"
    desc: "不是这色不美，是它会把你已经偏冷的根继续冷下去。"
    note: "大面积冷银 / 钢蓝 / 高饱和银白色穿上身，你会「扎不稳」。"

# ============================================================
# 性格关键词
# ============================================================
personality:
  summary: |
    你是仲秋黄昏时分的一片麦田——
    根扎得深，叶子却被金风吹得太勤。
    你需要一束朱火，把根焐热；
    需要一抹橘光，让秋天不只是萧瑟。
  keywords:
    - { cn: "稳重", en: "GROUNDED" }
    - { cn: "包容", en: "EMBRACING" }
    - { cn: "敏锐", en: "SHARP" }
    - { cn: "深思", en: "DEEP" }
    - { cn: "明亮", en: "LUMINOUS" }
  description: |
    你看着温和包容，内里却有一股不轻易示人的清醒。
    你不是先表态的那一个，
    但你常常是最后那个把事情看透的人。
  description_2: |
    你的火不烈，藏在年与月之间，
    像秋日里被叶子半遮的太阳——
    不刺眼，却足够把人焐热。

