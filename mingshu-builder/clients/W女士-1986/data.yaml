# ============================================================
# 序章·缘起
# ============================================================
preface: |
  这是写给你的一本书。

  你出生在 1986 年丙寅年的秋分前后，
  己土之根扎在仲秋之野——
  根稳、心明，
  却需要一束足够的暖，把秋天的萧瑟化掉。

  接下来的几十页，不是命运的预测，
  也不是谁替你下的判词。
  它只是一面色彩的镜子——
  把你天生就在的那束光，描出来。

  愿你看完这本书时，
  认出画里的人，是你自己。

