    label: "戌时银河"
    origin: |
      七夕是中国的"星宿之夜"。
      古人讲究的不是买花送礼，
      而是在银河两端，让两个人都看到同一片星光。
      对你来说，这一晚最适合写一封信——
      不是给别人，是给三年后的自己。
    color_text: "粉霞 #F0A6A6 + 暖金 #D4AF37"
    actions:
      - "给三年后的自己写一封信"
      - "封口处盖你的本命色印章"
      - "封存到明信片盒里，三年后才打开"
    pengyouquan: "最浪漫的事，是有人和你看同一片星空。"

  - id: "zhongqiu"
    name: "中秋节"
    title: "中秋 · 月奉酒"
    en: "Mid-Autumn · Moonlit Toast"
    deco_char: "月"
    color_1: "#FAF7F2"
    color_2: "#D4AF37"
    label: "月下举杯"
    origin: |
      中秋始于上古祭月，唐宋时成为文人对"团圆"的祈愿。
      仲秋是你天然的季节，
      所以这一天的月，对你格外亲。
    color_text: "月白 #FAF7F2 + 桂金 #D4AF37 + 你的朱橘"
    actions:
      - "阳台上煮一壶桂花红茶"
      - "给三年后的自己写一封信，封口盖你的本命色印章"
      - "戌时推门出去，看一眼今晚的月"
    pengyouquan: "我们不缺月，缺的是抬头看月的那个瞬间。"

  - id: "chongyang"
    name: "重阳节"
    title: "重阳 · 黄菊远山"
    en: "Double Ninth · Chrysanthemum & Distant Hill"
    deco_char: "九"
    color_1: "#C9A66B"
    color_2: "#F4D03F"
    label: "山间登高"
    origin: |
      重阳是「九九」之日，古人在这一天登高、看菊花、喝菊酒，
      意思是站得高一点，看得远一点。
      你这一年走得稳，今天不妨抬头看远。
      给一位长辈打个电话，比任何祈福都强。
    color_text: "暖驼 #C9A66B + 菊黄 #F4D03F"
    actions:
      - "给一位长辈或导师打个电话"
      - "登一次高（不必很高，一座小山即可）"
      - "晚上煮一壶菊花茶"
    pengyouquan: "走得再快，也别忘了回头看看那束陪你长大的光。"

# ============================================================
# 24 节气（己土命主版）
# ============================================================
solar_terms:
  spring:
    title: "春之六节气"
    intro: "春属木，于你己土而言，是「破土」的时候。少做躁进事，多做生发事。"
    items:
      - { id: "lichun",   name: "立春", date: "2/4",  poem: "东风带春信，万物苏其魂。", action: "立春这天，给自己换一条嫩绿丝巾。木气生火，火生土，今天给根添一束新光。" }
      - { id: "yushui",   name: "雨水", date: "2/19", poem: "春雨润无声，新柳生细芽。", action: "泡一壶红茶。雨水时节饮温，对你尤其有益。" }
      - { id: "jingzhe",  name: "惊蛰", date: "3/5",  poem: "春雷动九霄，蛰虫应时鸣。", action: "把上个月该说没说的话，今天说了。惊蛰宜动，动嘴最易。" }
      - { id: "chunfen",  name: "春分", date: "3/20", poem: "燕子归故园，玉兰开窗前。", action: "春分昼夜均长，最宜衡。盘点一下今年的事，留下三件最重要的。" }
      - { id: "qingming", name: "清明", date: "4/4",  poem: "烟雨润青团，故人在心边。", action: "清明适合慎独。花一个下午，回想一个离开的人。" }
      - { id: "guyu",     name: "谷雨", date: "4/20", poem: "雨生百谷，麦苗如荫。",     action: "在工位放一盆水养竹。谷雨后 30 天，看它怎么长。" }
  summer:
    title: "夏之六节气"
    intro: "夏属火，与你的本命相合。这是你最该「出门」的季节。"
    items:
      - { id: "lixia",    name: "立夏", date: "5/5",  poem: "樱桃枝头红，薄荷石上凉。", action: "立夏开始，可以重新穿你的朱橘了。它属于你的色。" }
      - { id: "xiaoman",  name: "小满", date: "5/21", poem: "麦穗渐满仓，布谷催耕忙。", action: "小满不「盈」，留一分余地。今天不做满的事。" }
      - { id: "mangzhong",name: "芒种", date: "6/5",  poem: "麦熟谷新生，青梅落酒香。", action: "煮一壶青梅酒（无酒精也行），冰镇一夜。" }
      - { id: "xiazhi",   name: "夏至", date: "6/21", poem: "烈日当空照，莲花静自香。", action: "今天去看一片荷塘。不拍照，只看 10 分钟。" }
      - { id: "xiaoshu",  name: "小暑", date: "7/7",  poem: "蝉鸣午正酣，纸扇半开掩。", action: "睡一个舒服的午觉。这是夏天最该做的事。" }
      - { id: "dashu",    name: "大暑", date: "7/22", poem: "荷塘清茶冷，墨色入人心。", action: "今天只穿一身浅色，让眼睛先凉下来。" }
  autumn:
    title: "秋之六节气"
    intro: "秋属金，于你是「叶落金多」的季节。多穿暖色，给根焐一焐。"
    items:
      - { id: "liqiu",    name: "立秋", date: "8/7",  poem: "桂花探初凉，金风渐入帘。", action: "立秋开始穿暖驼。它是你的根色，秋天最稳。" }
      - { id: "chushu",   name: "处暑", date: "8/23", poem: "残荷映晚风，余热终自收。", action: "把上半年没复盘的事，今天复盘完。" }
      - { id: "bailu",    name: "白露", date: "9/8",  poem: "露珠凝草尖，芦苇白江畔。", action: "白露之后，开始喝温的红茶。让胃先安顿下来。" }
      - { id: "qiufen",   name: "秋分", date: "9/23", poem: "丹桂盛满枝，昼夜两相平。", action: "秋分日做「平衡」：写下今年的得失，各列五条。" }
      - { id: "hanlu",    name: "寒露", date: "10/8", poem: "红叶渐染山，菊花初上盘。", action: "今天买一枝菊花，放在书桌。" }
      - { id: "shuangjiang",name:"霜降",date: "10/23",poem: "霜叶红于二月花，柿子甜满枝头。", action: "煮一锅红色的甜汤——红枣、桂圆、红糖，给自己。" }
  winter:
    title: "冬之六节气"
    intro: "冬属水，水多于你为「湿土难暖」。这季节多穿朱火，多吃热食。"
    items:
      - { id: "lidong",   name: "立冬", date: "11/7", poem: "初雪覆青瓦，暖炉煮旧书。", action: "把家里最厚的那条围巾，从衣柜深处翻出来用。" }
      - { id: "xiaoxue",  name: "小雪", date: "11/22",poem: "薄雪入夜下，围炉数旧梦。", action: "今天写一段「今年我做对的三件事」，简短即可。" }
      - { id: "daxue",    name: "大雪", date: "12/7", poem: "梅雪同时落，雪山映孤心。", action: "大雪日适合独处。看一部老电影。" }
      - { id: "dongzhi",  name: "冬至", date: "12/21",poem: "饺子热腾腾，阳光初回身。", action: "冬至吃饺子。这是一年里最'暖根'的一天。" }
      - { id: "xiaohan",  name: "小寒", date: "1/5",  poem: "暖炉香腊梅，冷夜寄长信。", action: "煮一壶酒，写一封信。给一个今年只见过一次的朋友。" }
      - { id: "dahan",    name: "大寒", date: "1/20", poem: "红梅照雪开，暖光半山来。", action: "今天提前为来年的春节做一件小事，比如挑一副春联。" }

# ============================================================
# 终章
# ============================================================
afterword:
  big_quote_1: "色彩从来不是装饰"
  big_quote_2: "是一种自我宣告"
  letter: |
    这本书诞生于四十二日的阅读、推演、配色与校对。
    每一页的朱砂，都是亲手调的；
    每一枚印章，都因 W 这一字而刻。

    它不是命运的判词，
    是你的色彩自传。

    愿你看完之后，
    认出画里的人，
    是你自己。
  signature: "—— 主理人 拜"
  next_year_hook: |
    明年这本书会更厚——
    因为你会有更多色彩。

